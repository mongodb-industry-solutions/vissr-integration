Trailer:
  description: High-level Trailer data.
  type: branch

Trailer.Chassis:
  description: All data concerning steering, suspension, wheels, and brakes.
  type: branch

Trailer.Chassis.Accelerator:
  description: Accelerator signals
  type: branch

Trailer.Chassis.Accelerator.PedalPosition:
  datatype: uint8
  description: Accelerator pedal position as percent. 0 = Not depressed. 100 = Fully depressed.
  max: 100
  min: 0
  type: sensor
  unit: percent

Trailer.Chassis.Axle:
  description: Axle signals
  type: branch

Trailer.Chassis.Axle.Axle1:
  description: Axle signals
  type: branch

Trailer.Chassis.Axle.Axle1.AxleWidth:
  comment: Corresponds to SAE J1100-2009 W113.
  datatype: uint16
  description: The lateral distance between the wheel mounting faces, measured along the spindle axis.
  type: attribute
  unit: mm

Trailer.Chassis.Axle.Axle1.Driving:
  description: Axle driving features
  type: branch

Trailer.Chassis.Axle.Axle1.Driving.IsDiffLocked:
  datatype: boolean
  description: True if differential is locked on the axle.
  type: sensor

Trailer.Chassis.Axle.Axle1.Liftable:
  description: Axle liftable features
  type: branch

Trailer.Chassis.Axle.Axle1.Liftable.IsLifted:
  datatype: boolean
  description: True if axle is lifted.
  type: sensor

Trailer.Chassis.Axle.Axle1.Steerable:
  description: Axle steerable features
  type: branch

Trailer.Chassis.Axle.Axle1.Steerable.SteeringAngle:
  comment: Single track two-axle model steering angle refers to the angle that a centrally mounted wheel would have.
  datatype: float
  description: Single track two-axle model steering angle. Angle according to ISO 8855. Positive = degrees to the left. Negative = degrees to the right.
  type: sensor
  unit: degrees

Trailer.Chassis.Axle.Axle1.SteeringAngle:
  comment: Single track two-axle model steering angle refers to the angle that a centrally mounted wheel would have.
  datatype: float
  description: Single track two-axle model steering angle. Angle according to ISO 8855. Positive = degrees to the left. Negative = degrees to the right.
  type: sensor
  unit: degrees

Trailer.Chassis.Axle.Axle1.TireAspectRatio:
  datatype: uint8
  description: Aspect ratio between tire section height and tire section width, as per ETRTO / TRA standard.
  type: attribute
  unit: percent

Trailer.Chassis.Axle.Axle1.TireDiameter:
  datatype: float
  description: Outer diameter of tires, in inches, as per ETRTO / TRA standard.
  type: attribute
  unit: inch

Trailer.Chassis.Axle.Axle1.TireWidth:
  datatype: uint16
  description: Nominal section width of tires, in mm, as per ETRTO / TRA standard.
  type: attribute
  unit: mm

Trailer.Chassis.Axle.Axle1.TrackWidth:
  comment: Corresponds to SAE J1100-2009 W102.
  datatype: uint16
  description: The lateral distance between the centers of the wheels, measured along the spindle, or axle axis. If there are dual rear wheels, measure from the midway points between the inner and outer tires.
  type: attribute
  unit: mm

Trailer.Chassis.Axle.Axle1.TreadWidth:
  comment: Corresponds to SAE J1100-2009 W101.
  datatype: uint16
  description: The lateral distance between the centerlines of the base tires at ground, including camber angle. If there are dual rear wheels, measure from the midway points between the inner and outer tires.
  type: attribute
  unit: mm

