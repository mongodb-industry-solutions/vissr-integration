services:
  front:
    depends_on:
      mongo-init:
        condition: service_completed_successfully
    environment:
      MONGODB_URI: mongodb://mongodb:27017/?directConnection=true

  mongodb:
    image: mongo:8
    ports:
      - "27017:27017"
    command: ["--replSet", "rs0"]
    healthcheck:
      test:
        [
          "CMD",
          "mongosh",
          "--quiet",
          "--host",
          "localhost:27017",
          "--eval",
          "quit(db.hello().isWritablePrimary ? 0 : 1)",
        ]
      interval: 2s
      timeout: 5s
      retries: 30
    volumes:
      - mongodb-data:/data/db

  mongo-init:
    image: mongo:8
    depends_on:
      mongodb:
        condition: service_healthy
    volumes:
      - ./infra/mongodb/dump:/dump
    command: >
      bash -c "
        mongosh --host mongodb:27017 --eval 'try { rs.status() } catch (e) { rs.initiate({_id: \"rs0\", members: [{_id: 0, host: \"mongodb:27017\"}]}) }';
        until mongosh --quiet --host mongodb:27017 --eval 'quit(db.hello().isWritablePrimary ? 0 : 1)'; do
          sleep 1;
        done;
        if mongosh --quiet --host mongodb:27017 --eval 'quit(db.getSiblingDB(\"vissr-integration\").getCollectionNames().includes(\"vehicle_status\") ? 0 : 1)'; then
          echo 'MongoDB already initialized, skipping local seed restore.';
        else
          mongorestore --drop --uri mongodb://mongodb:27017/?directConnection=true /dump;
        fi;
      "

  mqtt-bridge:
    depends_on:
      mongo-init:
        condition: service_completed_successfully
    environment:
      MONGODB_URI: mongodb://mongodb:27017/?directConnection=true

volumes:
  mongodb-data:
