services:
  front:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      - MONGODB_URI=${MONGODB_URI}

  mosquitto:
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - mosquitto-data:/mosquitto/data
      - mosquitto-log:/mosquitto/log

  mongodb:
    image: mongo:8
    ports:
      - "27017:27017"
    command: ["--replSet", "rs0"]
    profiles:
      - local
    volumes:
      - mongodb-data:/data/db

  mongo-init:
    image: mongo:8
    depends_on:
      mongodb:
        condition: service_started
    profiles:
      - local
    volumes:
      - ./infra/mongodb/dump:/dump
    command: >
      bash -c "
        sleep 5;
        mongosh --host mongodb:27017 --eval 'try { rs.status() } catch (e) { rs.initiate({_id: \"rs0\", members: [{_id: 0, host: \"mongodb:27017\"}]}) }';
        mongorestore --host mongodb:27017 /dump;
      "

volumes:
  mosquitto-data:
  mosquitto-log:
  mongodb-data:
