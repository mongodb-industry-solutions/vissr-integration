services:
  front:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    depends_on:
      mongo-init:
        condition: service_completed_successfully
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      MONGODB_URI: ${MONGODB_URI:-}
      DATABASE_NAME: ${DATABASE_NAME:-vissr-integration}
      VSS_JSON_PATH: ${VSS_JSON_PATH:-/data/zod_vss.json}
      VSS_JSON_ROOT_DIR: ${VSS_JSON_ROOT_DIR:-/app/public}
      MQTT_VIN: ${MQTT_VIN:-MDBAX9C12XYZ1234}
      VEHICLE_VINS: ${VEHICLE_VINS:-MDBAX9C12XYZ1234}
      VEHICLE_DEFINITIONS_B64: ${VEHICLE_DEFINITIONS_B64:-}
      PROFILE: ${PROFILE:-zod}

  mosquitto:
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./infra/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - mosquitto-data:/mosquitto/data
      - mosquitto-log:/mosquitto/log

  vissr:
    build:
      context: ./infra/vissr
      dockerfile: Dockerfile
    depends_on:
      mosquitto:
        condition: service_started
    environment:
      - MQTT_BROKER_ADDR=mosquitto
      - MQTT_VEHICLE_VIN=${MQTT_VIN:-MDBAX9C12XYZ1234}
    ports:
      - "8888:8080" # VISS WebSocket port (Container WS runs on 8080. Mapping to host 8888)
      - "8090:8888" # VISS HTTP port (Container HTTP runs on 8888. Mapping to host 8090)
      - "8600:8600" # VISS AT server
      - "8887:8887" # VISS gRPC port
    volumes:
      - ./infra/vissr/data:/app/data

  mqtt-bridge:
    build:
      context: ./infra/mqtt-bridge
      dockerfile: Dockerfile
    depends_on:
      mongo-init:
        condition: service_completed_successfully
      mosquitto:
        condition: service_started
    env_file:
      - .env
    environment:
      MQTT_BROKER_URL: mqtt://mosquitto:1883
      MONGODB_URI: ${MONGODB_URI:-}
      DATABASE_NAME: ${DATABASE_NAME:-vissr-integration}
      VEHICLE_VINS: ${VEHICLE_VINS:-MDBAX9C12XYZ1234}
      VSS_JSON_PATH: ${VSS_JSON_PATH:-/data/zod_vss.json}
      VSS_JSON_ROOT_DIR: ${VSS_JSON_ROOT_DIR:-/app/public}
      VEHICLE_DEFINITIONS_B64: ${VEHICLE_DEFINITIONS_B64:-}
    volumes:
      - ./frontend/public:/app/public:ro

  mongo-init:
    image: mongo:8
    env_file:
      - .env
    volumes:
      - ./infra/mongodb/init:/scripts:ro
    command: ["bash", "/scripts/run-init.sh"]
    environment:
      MONGODB_URI: ${MONGODB_URI:-}
      DATABASE_NAME: ${DATABASE_NAME:-vissr-integration}
      MONGO_BOOTSTRAP_CONFIG_B64: ${MONGO_BOOTSTRAP_CONFIG_B64:-}

volumes:
  mosquitto-data:
  mosquitto-log:
