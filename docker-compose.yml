services:
  front:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      - MONGODB_URI=${MONGODB_URI:-mongodb://mongodb:27017/vissr-integration?replicaSet=rs0}
      - DATABASE_NAME=${DATABASE_NAME:-vissr-integration}
      - VSS_JSON_PATH=${VSS_JSON_PATH:-/data/zod_vss.json}
      - MQTT_VIN=${MQTT_VIN:-MDBAX9C12XYZ1234}
      - VEHICLE_VINS=${VEHICLE_VINS:-MDBAX9C12XYZ1234}

  mosquitto:
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./infra/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - mosquitto-data:/mosquitto/data
      - mosquitto-log:/mosquitto/log

  mongodb:
    image: mongo:8
    ports:
      - "27017:27017"
    command: ["--replSet", "rs0"]
    profiles:
      - local
    volumes:
      - mongodb-data:/data/db

  mongo-init:
    image: mongo:8
    depends_on:
      mongodb:
        condition: service_started
    profiles:
      - local
    volumes:
      - ./infra/mongodb/dump:/dump
    command: >
      bash -c "
        sleep 5;
        mongosh --host mongodb:27017 --eval 'try { rs.status() } catch (e) { rs.initiate({_id: \"rs0\", members: [{_id: 0, host: \"mongodb:27017\"}]}) }';
        mongorestore --host mongodb:27017 /dump;
      "

  vissr:
    build:
      context: ./infra/vissr
      dockerfile: Dockerfile
    depends_on:
      mosquitto:
        condition: service_started
    environment:
      - MQTT_BROKER_ADDR=mosquitto
      - MQTT_VEHICLE_VIN=${MQTT_VIN:-MDBAX9C12XYZ1234}
    ports:
      - "8888:8080" # VISS WebSocket port (Container WS runs on 8080. Mapping to host 8888)
      - "8090:8888" # VISS HTTP port (Container HTTP runs on 8888. Mapping to host 8090)
      - "8600:8600" # VISS AT server
      - "8887:8887" # VISS gRPC port
    volumes:
      - ./infra/vissr/data:/app/data
      - ./infra/vissr/config/uds-registration.json:/app/server/vissv2server/uds-registration.json

  vissr-truck1:
    profiles:
      - truck
    build:
      context: ./infra/vissr
      dockerfile: Dockerfile
    depends_on:
      mosquitto:
        condition: service_started
    entrypoint: ["/app/start-truck1.sh"]
    environment:
      - MQTT_BROKER_ADDR=mosquitto
      - MQTT_VEHICLE_VIN=1FABP34W72K012345
    ports:
      - "9888:8080" # Truck1 VISS WebSocket port
      - "9090:8888" # Truck1 VISS HTTP port
      - "9600:8600" # Truck1 VISS AT server
      - "9887:8887" # Truck1 VISS gRPC port
    volumes:
      - ./infra/vissr/data:/app/data
      - ./infra/vissr/truck1-viss.him:/app/truck1-demo/viss.him:ro
      - ./infra/vissr/config/uds-registration-truck1.json:/app/truck1-demo/uds-registration.json:ro

  mqtt-bridge:
    build:
      context: ./infra/mqtt-bridge
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      - MQTT_BROKER_URL=mqtt://mosquitto:1883
      - MONGODB_URI=${MONGODB_URI:-mongodb://mongodb:27017/vissr-integration?replicaSet=rs0}
      - DATABASE_NAME=${DATABASE_NAME:-vissr-integration}
      - VEHICLE_VINS=${VEHICLE_VINS:-MDBAX9C12XYZ1234}
    depends_on:
      - mosquitto

volumes:
  mosquitto-data:
  mosquitto-log:
  mongodb-data:
